<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Page Not Found | Forest SD</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌲</text></svg>">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --green: #2d6a4f; --green-light: #40916c; --green-dark: #1b4332; --sand: #f5f0e8; --text: #1a1a1a; --accent: #52b788; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--sand); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 2rem; }
        .emoji { font-size: 5rem; margin-bottom: 1rem; }
        h1 { font-size: 6rem; font-weight: 700; color: var(--green-dark); line-height: 1; margin-bottom: 0.5rem; }
        p { font-size: 1.2rem; color: #555; margin-bottom: 2rem; max-width: 450px; }
        .links { display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center; }
        .links a { padding: 0.75rem 1.5rem; border-radius: 0.5rem; text-decoration: none; font-weight: 500; font-size: 0.95rem; transition: all 0.2s; }
        .btn-primary { background: var(--green); color: white; }
        .btn-primary:hover { background: var(--green-dark); }
        .btn-secondary { background: white; color: var(--green); border: 1px solid #ddd; }
        .btn-secondary:hover { border-color: var(--accent); }
    </style>
</head>
<body>
    <div class="emoji">🌲</div>
    <h1>404</h1>
    <p>Looks like you wandered off the trail. This page doesn't exist — but there's plenty to explore.</p>
    <div class="links">
        <a href="/" class="btn-primary">Go Home</a>
        <a href="/blog/" class="btn-secondary">Read the Blog</a>
        <a href="/contact" class="btn-secondary">Get in Touch</a>
    </div>
    <script src="https://app.rybbit.io/api/script.js" async data-site-id="8873"></script>
</body>
</html>
